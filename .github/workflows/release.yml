name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Build Release
      run: dotnet build -c Release

    - name: Create ZIP
      run: |
        Compress-Archive `
          -Path "bin/Release/net8.0-windows/*" `
          -DestinationPath PressSubscription.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PressSubscription
        path: PressSubscription.zip

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: PressSubscription.zip
        generate_release_notes: true